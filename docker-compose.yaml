services:
  refrain:
    build: .
    image: gerald-lbn/refrain
    container_name: refrain
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - REFRAIN_LOG_LEVEL=info
      - REFRAIN_LIBRARIES=/music
      - REFRAIN_APP_WORKERS=5
    volumes:
      - /path/to/your/music:/music
